name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against panic = "abort" (preserves FFI catch_unwind safety)
        # PyO3 turns Rust panics into Python exceptions via catch_unwind, which
        # only works under panic = "unwind". This step fails the build if any
        # tracked Cargo.toml sets panic = "abort".
        run: bash scripts/check-panic-unwind.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check

      # The Python test suite is the ONLY thing that exercises the binding's
      # actual behavior -- cargo check merely proves it compiles. Without this
      # step the engine can drift underneath us silently: the carve-rs pin sat
      # months behind (missing braced-only sup/sub and the :name: symbol) and
      # CI stayed green throughout.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # `maturin develop` requires an active virtualenv; build a wheel and
      # install it instead, which needs no environment juggling on CI.
      - name: Build and install the wheel
        run: |
          pip install maturin pytest
          maturin build --release --out dist
          pip install --find-links dist --force-reinstall carve

      - name: pytest
        run: pytest -q
